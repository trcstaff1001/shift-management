<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>出欠管理 / シフト管理（管理）</title>
  <link rel="stylesheet" href="style.css" />
  <script src="../../config.js"></script>
  <script src="api.js"></script>
  <style>
    .clock-time {
      font-size: 12px;
      color: #555;
      font-variant-numeric: tabular-nums;
    }
    .clock-time.missing { color: #bbb; font-style: italic; }
    .attendance-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .attendance-row:last-child { border-bottom: none; }
    .attendance-clocks {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      min-width: 80px;
    }
    .no-att-section {
      margin-top: 8px;
      padding: 10px 14px;
      background: #fff8e1;
      border-radius: 8px;
      font-size: 13px;
      color: #795548;
    }
    .no-att-section strong { display: block; margin-bottom: 6px; color: #5d4037; }
    .no-att-item { padding: 2px 0; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h1>シフト管理</h1>
        <p>管理画面</p>
      </div>
      <nav>
        <ul class="sidebar-nav">
          <li class="group-label">運用</li>
          <li><a href="dashboard.html">ダッシュボード</a></li>
          <li><a href="adjust.html">シフト調整</a></li>
          <li><a href="attendance.html" class="active">出欠管理</a></li>
          <li class="group-label">マスタ</li>
          <li><a href="users.html">利用者管理</a></li>
          <li><a href="business_days.html">営業日カレンダー</a></li>
          <li class="group-label">その他</li>
          <li><a href="notifications.html">通知配信履歴</a></li>
          <li><a href="login.html">ログアウト</a></li>
        </ul>
      </nav>
      <div class="sidebar-foot">ver 0.3</div>
    </aside>

    <div class="main">
      <header class="main-header">
        <h1>出欠管理</h1>
        <div class="header-actions">
          <div class="month-nav">
            <button class="month-nav-btn" data-dir="-1" title="前日">←</button>
            <input type="date" class="form-input" id="dateInput" style="max-width: 180px;">
            <button class="month-nav-btn" data-dir="+1" title="翌日">→</button>
          </div>
          <button class="btn btn-secondary" id="todayBtn">今日</button>
        </div>
      </header>

      <div class="main-content">
        <p class="page-lead">通所予定者の出勤・欠勤を記録します。欠勤を記録すると、希望していた他の利用者に空き枠通知が自動送信されます。</p>

        <div class="stat-grid">
          <div class="stat success">
            <p class="stat-label">出勤</p>
            <p class="stat-value" id="presentCount">—<span class="unit">名</span></p>
          </div>
          <div class="stat danger">
            <p class="stat-label">欠勤</p>
            <p class="stat-value" id="absentCount">—<span class="unit">名</span></p>
          </div>
          <div class="stat warn">
            <p class="stat-label">未記録</p>
            <p class="stat-value" id="unrecordedCount">—<span class="unit">名</span></p>
          </div>
          <div class="stat">
            <p class="stat-label">本日の予定者</p>
            <p class="stat-value" id="totalCount">—<span class="unit">名</span></p>
          </div>
        </div>

        <div class="card">
          <h2 class="card-title">
            <span id="dateLabel">—</span>
            <span class="card-action text-muted text-sm">タップで出欠を切り替え</span>
          </h2>

          <div id="attendanceList"></div>
          <p class="text-xs text-muted mt-3" id="emptyMsg" style="display: none;">この日付の通所予定者はいません。</p>

          <!-- 未打刻者セクション -->
          <div class="no-att-section" id="noClockSection" style="display:none;">
            <strong>未打刻（打刻なし）</strong>
            <div id="noClockList"></div>
          </div>
        </div>

        <div class="card">
          <h2 class="card-title">直近の欠勤記録（同月）</h2>
          <div class="table-wrap" style="margin-bottom: 0;">
            <table class="table">
              <thead>
                <tr><th>日付</th><th>利用者</th><th>備考</th></tr>
              </thead>
              <tbody id="recentAbsentTbody">
                <tr><td colspan="3" class="text-muted text-center">読み込み中…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== 状態 ==========
    function todayStr() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    let target     = getDateFromHash() || todayStr();
    let allUsers   = [];     // 利用者マスタ（user_id → user）
    let userById   = new Map();
    let todayUsers = [];     // 当日の予定者 [{ user_id, name, category, state, clock_in, clock_out }]

    function getDateFromHash() {
      const m = location.hash.match(/date=(\d{4}-\d{2}-\d{2})/);
      return m ? m[1] : null;
    }
    function setDateHash(dateStr) { location.hash = 'date=' + dateStr; }

    function shiftDate(dateStr, days) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(y, m - 1, d);
      dt.setDate(dt.getDate() + days);
      return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
    }

    function fmtClock(t) {
      if (!t) return null;
      const m = String(t).match(/(\d{2}):(\d{2})/);
      return m ? m[1] + ':' + m[2] : String(t);
    }

    function statusFromGas(s) {
      // GAS は '出勤' / '欠勤' / '未確定' を返す
      if (s === '出勤') return 'present';
      if (s === '欠勤') return 'absent';
      return null;
    }
    function statusToGas(s) {
      return s === 'present' ? '出勤' : (s === 'absent' ? '欠勤' : '');
    }

    // ========== ロード ==========
    async function loadUsersOnce() {
      if (allUsers.length > 0) return;
      try {
        allUsers = await ShiftAdminAPI.listUsers('利用中');
        userById = new Map(allUsers.map(u => [Number(u.user_id), u]));
      } catch (e) {
        console.error(e);
      }
    }

    async function loadData(dateStr) {
      await loadUsersOnce();
      const month = dateStr.substring(0, 7);
      try {
        const [confirmedRows, attendanceRows] = await Promise.all([
          ShiftAdminAPI.listShiftConfirmed({ month }),
          ShiftAdminAPI.listAttendances({ month }),
        ]);
        // 当日の確定者
        const confirmedToday = confirmedRows.filter(r => String(r.date) === dateStr);
        const attMap = new Map();
        attendanceRows.filter(r => String(r.date) === dateStr).forEach(a => attMap.set(Number(a.user_id), a));

        todayUsers = confirmedToday.map(c => {
          const uid = Number(c.user_id);
          const u   = userById.get(uid) || { user_id: uid, name: '#' + uid, category: '—' };
          const a   = attMap.get(uid);
          return {
            user_id:   uid,
            name:      u.name,
            category:  u.category,
            state:     a ? statusFromGas(a.status) : null,
            clock_in:  a ? a.clock_in  : '',
            clock_out: a ? a.clock_out : '',
            is_external: String(c.is_facility_external) === 'TRUE',
          };
        });

        renderRecentAbsent(attendanceRows);
      } catch (e) {
        console.error(e);
        todayUsers = [];
      }
      render();
    }

    function renderRecentAbsent(rows) {
      const tbody = document.getElementById('recentAbsentTbody');
      const absents = rows
        .filter(r => r.status === '欠勤')
        .sort((a, b) => String(b.date).localeCompare(String(a.date)))
        .slice(0, 10);
      if (absents.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-muted text-center">同月の欠勤記録はありません</td></tr>';
        return;
      }
      tbody.innerHTML = absents.map(r => {
        const u = userById.get(Number(r.user_id));
        const name = u ? u.name : '#' + r.user_id;
        const note = r.note || '—';
        return '<tr><td>' + r.date + '</td><td>' + name + '</td><td>' + note + '</td></tr>';
      }).join('');
    }

    // ========== 描画 ==========
    function render() {
      document.getElementById('dateInput').value = target;

      const [y, m, d] = target.split('-').map(Number);
      const dowName = ['日', '月', '火', '水', '木', '金', '土'][new Date(y, m - 1, d).getDay()];
      document.getElementById('dateLabel').textContent =
        '通所予定者一覧（' + y + '年' + m + '月' + d + '日 ' + dowName + '曜）';

      const total       = todayUsers.length;
      const present     = todayUsers.filter(u => u.state === 'present').length;
      const absent      = todayUsers.filter(u => u.state === 'absent').length;
      const unrecorded  = todayUsers.filter(u => u.state === null).length;

      document.getElementById('presentCount').innerHTML    = present    + '<span class="unit">名</span>';
      document.getElementById('absentCount').innerHTML     = absent     + '<span class="unit">名</span>';
      document.getElementById('unrecordedCount').innerHTML = unrecorded + '<span class="unit">名</span>';
      document.getElementById('totalCount').innerHTML      = total      + '<span class="unit">名</span>';

      const list     = document.getElementById('attendanceList');
      const emptyMsg = document.getElementById('emptyMsg');

      if (total === 0) {
        list.innerHTML = '';
        emptyMsg.style.display = '';
        document.getElementById('noClockSection').style.display = 'none';
        return;
      }
      emptyMsg.style.display = 'none';

      list.innerHTML = todayUsers.map((u, i) => {
        const ci = fmtClock(u.clock_in);
        const co = fmtClock(u.clock_out);
        const clockHtml = (u.state === 'present' || u.clock_in)
          ? [
              '<div class="attendance-clocks">',
              '  <span class="clock-time' + (ci ? '' : ' missing') + '">出: ' + (ci || '—') + '</span>',
              '  <span class="clock-time' + (co ? '' : ' missing') + '">退: ' + (co || '—') + '</span>',
              '</div>',
            ].join('')
          : '<div class="attendance-clocks"></div>';

        return [
          '<div class="attendance-row">',
          '  <div class="attendance-name">',
          '    ' + u.name,
          '    <span class="meta">#' + u.user_id + ' / ' + u.category + (u.is_external ? ' / 施設外' : '') + '</span>',
          '  </div>',
          clockHtml,
          '  <div class="attendance-toggle" data-idx="' + i + '">',
          '    <button class="present' + (u.state === 'present' ? ' active' : '') + '" data-state="present">出勤</button>',
          '    <button class="absent'  + (u.state === 'absent'  ? ' active' : '') + '" data-state="absent">欠勤</button>',
          '  </div>',
          '</div>',
        ].join('');
      }).join('');

      list.querySelectorAll('.attendance-toggle').forEach(toggle => {
        toggle.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx = +toggle.dataset.idx;
            const newState = btn.dataset.state;
            saveAttendance(idx, newState);
          });
        });
      });

      // 未打刻者セクション（出勤記録があるが clock_in なし）
      const noClock = todayUsers.filter(u => u.state === 'present' && !u.clock_in);
      const noClockSec  = document.getElementById('noClockSection');
      const noClockList = document.getElementById('noClockList');
      if (noClock.length > 0) {
        noClockList.innerHTML = noClock.map(u =>
          '<div class="no-att-item">・' + u.name + '（' + u.category + '）</div>'
        ).join('');
        noClockSec.style.display = '';
      } else {
        noClockSec.style.display = 'none';
      }
    }

    // ========== 出欠記録の保存 ==========
    async function saveAttendance(idx, newState) {
      const u = todayUsers[idx];
      if (!u) return;
      const oldState = u.state;
      u.state = newState; // 楽観的更新
      render();
      try {
        await ShiftAdminAPI.recordAttendance([{
          user_id: u.user_id,
          date:    target,
          status:  statusToGas(newState),
        }]);
      } catch (err) {
        u.state = oldState;
        render();
        alert('保存に失敗しました: ' + (err.message || 'エラー'));
      }
    }

    // ========== 日付切替 ==========
    document.querySelectorAll('.month-nav-btn').forEach(btn => {
      btn.addEventListener('click', () => setDateHash(shiftDate(target, +btn.dataset.dir)));
    });
    document.getElementById('dateInput').addEventListener('change', e => setDateHash(e.target.value));
    document.getElementById('todayBtn').addEventListener('click', () => setDateHash(todayStr()));

    window.addEventListener('hashchange', () => {
      target = getDateFromHash() || target;
      loadData(target);
    });

    if (!getDateFromHash()) setDateHash(target);
    loadData(target);
  </script>
</body>
</html>
