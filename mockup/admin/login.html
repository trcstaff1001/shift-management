<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理者ログイン / シフト管理</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-screen">
  <main class="login-card">
    <div class="login-brand">
      <h1>シフト管理 — 管理画面</h1>
      <p>支援員・サビ管・施設長用</p>
    </div>

    <form onsubmit="event.preventDefault(); location.href='dashboard.html';">
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input id="email" class="form-input" type="email" placeholder="staff@example.com" autocomplete="username" required />
      </div>

      <div class="form-group">
        <label for="password">パスワード</label>
        <input id="password" class="form-input" type="password" autocomplete="current-password" required />
      </div>

      <button class="btn btn-lg" type="submit" style="width: 100%;">ログイン</button>
    </form>
  </main>
</body>
</html>
