<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン / シフト管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="../../config.js"></script>
  <script src="api.js"></script>
</head>
<body class="login-screen">
  <main class="login-card">
    <div class="login-brand">
      <h1>シフト管理</h1>
      <p>ご自身のIDでログインしてください</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="userId">利用者ID</label>
        <input id="userId" class="form-input" type="text" inputmode="numeric" placeholder="例: 10001" autocomplete="username" required />
      </div>

      <div class="form-group">
        <label for="password">パスワード</label>
        <input id="password" class="form-input" type="password" autocomplete="current-password" required />
      </div>

      <p id="loginError" class="text-sm" style="color: var(--danger); display: none; margin: 0 0 12px;"></p>

      <div class="btn-stack">
        <button class="btn" id="loginBtn" type="submit">ログイン</button>
        <a class="btn btn-secondary" href="#">パスワードを忘れた方</a>
      </div>
    </form>

    <p class="text-sm text-muted center mt-4" style="margin-top: 24px;">
      利用者IDが分からない方は支援員にお声がけください
    </p>
  </main>

  <script>
    // 既にログイン済みなら home へ
    if (ShiftAPI.getSession()) {
      location.href = 'home.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userId = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      errEl.textContent = '';

      const btn = document.getElementById('loginBtn');
      const restore = ShiftAPI.busyButton(btn, 'ログイン中…');

      try {
        await ShiftAPI.login(Number(userId), password);
        location.href = 'home.html';
      } catch (err) {
        errEl.textContent = err.message || 'ログインに失敗しました';
        errEl.style.display = 'block';
        restore();
      }
    });
  </script>
</body>
</html>
