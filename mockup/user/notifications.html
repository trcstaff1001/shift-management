<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お知らせ / シフト管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="../../config.js"></script>
  <script src="api.js"></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a class="back-link" href="home.html">ホーム</a>
      <h1>お知らせ</h1>
      <span style="width: 60px;"></span>
    </header>

    <main class="app-main">
      <p class="page-lead" id="unreadLead">読み込み中…</p>
      <ul class="notif-list" id="notifList"></ul>
    </main>

    <nav class="app-footer-nav">
      <a href="home.html">ホーム</a>
      <a href="request.html">希望</a>
      <a href="calendar.html">シフト</a>
      <a href="notifications.html" class="active">通知</a>
    </nav>
  </div>

  <script>
    ShiftAPI.requireSession();

    function formatDate(str) {
      const d = new Date(String(str).replace(' ', 'T'));
      if (isNaN(d)) return str;
      return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日 '
        + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    function actionHtml(n) {
      if (n.type === 'シフト確定通知') {
        return '<div class="notif-action"><a class="btn btn-secondary" href="calendar.html">確定シフトを見る</a></div>';
      }
      if (n.type === '空き枠通知' && n.target_date) {
        return '<div class="notif-action">'
          + '<button class="btn" data-vacancy-date="' + n.target_date + '">この日に申し込む</button>'
          + '<span class="vacancy-status text-sm text-muted" style="margin-left:8px;"></span>'
          + '</div>';
      }
      return '';
    }

    async function applyVacancy(btn, date) {
      const status  = btn.parentElement.querySelector('.vacancy-status');
      const restore = ShiftAPI.busyButton(btn, '申し込み中…');
      try {
        await ShiftAPI.applyVacancy(date);
        btn.textContent  = '✓ 確定しました';
        btn.disabled     = true;
        if (status) status.textContent = date + ' の通所が確定';
      } catch (err) {
        restore();
        if (status) status.textContent = '失敗: ' + (err.message || 'エラー');
      }
    }

    function typeLabel(t) {
      if (t === 'シフト確定通知') return 'シフト確定のお知らせ';
      if (t === '空き枠通知')     return '空き枠のお知らせ';
      return 'その他';
    }

    (async function init() {
      try {
        const notifs = await ShiftAPI.listNotifications();
        const unread = notifs.filter(n => String(n.is_read).toUpperCase() !== 'TRUE');

        document.getElementById('unreadLead').innerHTML =
          unread.length > 0
            ? '未読の通知が <strong>' + unread.length + '件</strong> あります'
            : '未読の通知はありません';

        const list = document.getElementById('notifList');
        if (notifs.length === 0) {
          list.innerHTML = '<li class="notif-item"><p class="notif-message text-muted">通知はありません</p></li>';
          return;
        }

        list.innerHTML = notifs.map(n => {
          const isUnread = String(n.is_read).toUpperCase() !== 'TRUE';
          return [
            '<li class="notif-item' + (isUnread ? ' unread' : '') + '">',
            '<p class="notif-type">' + typeLabel(n.type) + '</p>',
            '<p class="notif-message">' + (n.message || '—') + '</p>',
            '<p class="notif-meta">' + formatDate(n.created_at) + '</p>',
            actionHtml(n),
            '</li>',
          ].join('');
        }).join('');

        // 「申し込む」ボタン bind
        list.querySelectorAll('button[data-vacancy-date]').forEach(btn => {
          btn.addEventListener('click', () => applyVacancy(btn, btn.dataset.vacancyDate));
        });

        // ページを開いた時点で全件既読化
        if (unread.length > 0) {
          await ShiftAPI.markRead(null);
        }
      } catch (e) {
        document.getElementById('unreadLead').textContent = '読み込みに失敗しました';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
